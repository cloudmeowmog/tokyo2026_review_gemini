<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅程時間軸回顧</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        /* 時間軸主體 */
        .timeline {
            position: relative;
            max-width: 1000px;
            margin: 40px auto;
        }
        /* 中間的垂直線 */
        .timeline::after {
            content: '';
            position: absolute;
            width: 6px;
            background-color: #c5c5c5;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -3px;
        }
        /* 左右區塊容器 */
        .container {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
        }
        .left {
            left: 0;
        }
        .right {
            left: 50%;
        }
        /* 時間軸上的圓點 */
        .container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            right: -10px;
            background-color: white;
            border: 4px solid #ff9f55;
            top: 20px;
            border-radius: 50%;
            z-index: 1;
        }
        .right::after {
            left: -10px;
        }
        /* 內容卡片 */
        .content {
            padding: 20px;
            background-color: white;
            position: relative;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .content img {
            width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: none; /* 預設隱藏，有圖片才顯示 */
        }
        .content h2 {
            margin-top: 0;
            color: #ff9f55;
        }
        .content p {
            line-height: 1.6;
            color: #555;
        }
        /* 控制面板 */
        .control-panel {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button, input[type="file"] {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #ff9f55;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #e88d44;
        }
        /* 響應式設計：在小螢幕時改為單邊時間軸 */
        @media screen and (max-width: 768px) {
            .timeline::after {
                left: 31px;
            }
            .container {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }
            .container::before {
                left: 60px;
                border: medium solid white;
                border-width: 10px 10px 10px 0;
                border-color: transparent white transparent transparent;
            }
            .left::after, .right::after {
                left: 21px;
            }
            .right {
                left: 0%;
            }
        }
        
        /* 編輯模式樣式 */
        .editable {
            border: 1px dashed #ccc;
            padding: 5px;
            min-height: 20px;
        }
        .edit-controls {
            display: none;
            margin-top: 10px;
        }
        .editing .edit-controls {
            display: block;
        }
    </style>
</head>
<body>

    <h1>我們的旅程回顧</h1>

    <div class="control-panel">
        <label for="github-token">GitHub Token:</label>
        <input type="password" id="github-token" placeholder="請輸入 GitHub PAT">
        <label for="github-repo">Repository:</label>
        <input type="text" id="github-repo" placeholder="username/repo">
        <br><br>
        <button onclick="toggleEditMode()">切換編輯模式</button>
        <button onclick="addNewEntry()">新增景點紀錄</button>
    </div>

    <div class="timeline" id="timeline">
        <div class="container left">
            <div class="content">
                <h2 contenteditable="false" class="edit-text">出發！第一天的驚喜</h2>
                <h4 contenteditable="false" class="edit-text">2026-04-17</h4>
                <p contenteditable="false" class="edit-text">記錄這美好的第一站，大家都非常興奮！</p>
                <img src="" alt="景點照片" class="preview-img">
                
                <div class="edit-controls">
                    <input type="file" accept="image/*" onchange="previewAndUploadImage(this)">
                    <button onclick="saveEntry(this)">儲存此紀錄到 GitHub</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isEditing = false;
        let entryCount = 1;

        // 切換編輯模式
        function toggleEditMode() {
            isEditing = !isEditing;
            const textElements = document.querySelectorAll('.edit-text');
            const contents = document.querySelectorAll('.content');
            
            textElements.forEach(el => {
                el.contentEditable = isEditing;
                if (isEditing) el.classList.add('editable');
                else el.classList.remove('editable');
            });

            contents.forEach(el => {
                if (isEditing) el.classList.add('editing');
                else el.classList.remove('editing');
            });
            
            alert(isEditing ? "編輯模式已開啟！您可以直接點擊文字進行修改。" : "編輯模式已關閉。");
        }

        // 新增一個時間軸節點
        function addNewEntry() {
            entryCount++;
            const side = entryCount % 2 === 0 ? 'right' : 'left';
            const timeline = document.getElementById('timeline');
            
            const newEntry = document.createElement('div');
            newEntry.className = `container ${side}`;
            newEntry.innerHTML = `
                <div class="content ${isEditing ? 'editing' : ''}">
                    <h2 contenteditable="${isEditing}" class="edit-text ${isEditing ? 'editable' : ''}">新景點名稱</h2>
                    <h4 contenteditable="${isEditing}" class="edit-text ${isEditing ? 'editable' : ''}">日期</h4>
                    <p contenteditable="${isEditing}" class="edit-text ${isEditing ? 'editable' : ''}">輸入您的回顧心得...</p>
                    <img src="" alt="景點照片" class="preview-img">
                    
                    <div class="edit-controls">
                        <input type="file" accept="image/*" onchange="previewAndUploadImage(this)">
                        <button onclick="saveEntry(this)">儲存此紀錄到 GitHub</button>
                    </div>
                </div>
            `;
            timeline.appendChild(newEntry);
        }

        // 預覽圖片並轉換為 Base64 (準備上傳用)
        function previewAndUploadImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = input.parentElement.parentElement.querySelector('.preview-img');
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    // 將 base64 字串存入 dataset，方便後續上傳
                    input.dataset.base64 = e.target.result.split(',')[1]; 
                    input.dataset.filename = file.name;
                }
                reader.readAsDataURL(file);
            }
        }

        // 呼叫 GitHub API 上傳照片與資料
        async function saveEntry(button) {
            const token = document.getElementById('github-token').value;
            const repo = document.getElementById('github-repo').value;
            
            if (!token || !repo) {
                alert('請先在上方輸入 GitHub Token 與 Repository 名稱 (例如: myname/myrepo)');
                return;
            }

            const contentDiv = button.parentElement.parentElement;
            const fileInput = contentDiv.querySelector('input[type="file"]');
            
            // 1. 如果有圖片，先上傳圖片到 upload_photo/ 目錄
            if (fileInput.dataset.base64 && fileInput.dataset.filename) {
                const filename = new Date().getTime() + "_" + fileInput.dataset.filename; // 避免檔名重複
                const path = `upload_photo/${filename}`;
                
                try {
                    button.innerText = "圖片上傳中...";
                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload photo: ${filename}`,
                            content: fileInput.dataset.base64
                        })
                    });

                    if (response.ok) {
                        alert('圖片上傳 GitHub 成功！(儲存於 upload_photo/)');
                        button.innerText = "儲存此紀錄到 GitHub";
                        // 註：實務上還需要把網頁當前的 HTML 結構也 commit 回 GitHub，
                        // 但這需要抓取整個 DOM 或透過 JSON 管理資料狀態。
                    } else {
                        const err = await response.json();
                        alert('上傳失敗: ' + err.message);
                        button.innerText = "儲存此紀錄到 GitHub";
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('發生錯誤，請檢查網路或 F12 Console。');
                    button.innerText = "儲存此紀錄到 GitHub";
                }
            } else {
                alert("您已修改文字。若要發佈文字變更，實務上需將資料轉為 JSON 儲存或重新 commit index.html。");
            }
        }
    </script>
</body>
</html>
